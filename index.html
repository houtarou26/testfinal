<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #1a1a1a;
}

.button-container {
    display:flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden; /* Keeps the button from going off-screen */
    
}

#flee-btn {
    position: absolute;
    /* right:400px; */
    padding: 15px 30px;
    font-size: 18px;
    background-color: #ff4757;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: top 0.1s ease, left 0.1s ease; /* Smooth, snappy movement */
}
#accept-btn{
    /* margin-right:300px; */
    position: absolute;
    left:400px;
    padding: 15px 30px;
    font-size: 18px;
    background-color: transparent;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    animation-name: glowing;
    animation-duration: 1s;
    animation-iteration-count: infinite;
    /* animation-delay: 2s; */
    animation-timing-function: cubic-bezier(1, 0, 0, 1);
}

@keyframes glowing{
    0%{
        box-shadow: 0 0 0px aqua, 0 0 0px aqua;
    }

    100%{
        box-shadow: 0 0 8px aqua, 0 0 8px aqua;
    }
}
    </style>
<body>
    <div class="button-container">
    <button id="accept-btn">Accept!</button>
    <button id="flee-btn">Catch Me!</button>
    

    
</div>
    <script>
        const btn = document.getElementById('flee-btn');
const container = document.querySelector('.button-container');

btn.addEventListener('mouseover', () => {
    const containerRect = container.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    // Calculate random positions within the container
    const maxX = containerRect.width - btnRect.width;
    const maxY = containerRect.height - btnRect.height;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    // Apply the new coordinates
    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
});
    </script>
</body>
</html>
